name: Release on major/minor version bump

on:
  push:
    branches:
      - main
    paths:
      - MANIFEST.md

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read current and previous versions
        id: versions
        shell: bash
        run: |
          current_version=$(awk '/^version:/ {print $2}' MANIFEST.md)

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git show HEAD^:MANIFEST.md > /tmp/prev_manifest.md 2>/dev/null || true
          fi

          if [ -f /tmp/prev_manifest.md ]; then
            previous_version=$(awk '/^version:/ {print $2}' /tmp/prev_manifest.md)
          else
            previous_version=""
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"

      - name: Decide whether to release
        id: decide
        shell: bash
        run: |
          current="${{ steps.versions.outputs.current_version }}"
          previous="${{ steps.versions.outputs.previous_version }}"

          if [ -z "$current" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # First release if no previous version exists
          if [ -z "$previous" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$current" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r cur_major cur_minor cur_patch <<< "$current"
          IFS='.' read -r prev_major prev_minor prev_patch <<< "$previous"

          release=false

          if [ "$cur_major" -gt "$prev_major" ]; then
            release=true
          elif [ "$cur_major" -eq "$prev_major" ] && [ "$cur_minor" -gt "$prev_minor" ]; then
            release=true
          fi

          echo "release=$release" >> "$GITHUB_OUTPUT"
          echo "tag=v$current" >> "$GITHUB_OUTPUT"

      - name: Prepare archived docs
        if: steps.decide.outputs.release == 'true'
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp MANIFEST.md "release-artifacts/MANIFEST-${{ steps.versions.outputs.current_version }}.md"
          tar -czf "release-artifacts/agent-manifest-${{ steps.versions.outputs.current_version }}.tar.gz" MANIFEST.md

      - name: Create Git tag
        if: steps.decide.outputs.release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.decide.outputs.tag }}"
          git push origin "${{ steps.decide.outputs.tag }}"

      - name: Create GitHub release
        if: steps.decide.outputs.release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.decide.outputs.tag }}
          generate_release_notes: true
          files: |
            release-artifacts/MANIFEST-${{ steps.versions.outputs.current_version }}.md
            release-artifacts/agent-manifest-${{ steps.versions.outputs.current_version }}.tar.gz